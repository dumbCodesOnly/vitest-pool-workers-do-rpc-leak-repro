name: repro-do-rpc-leak

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run repro script
        run: bash ci/run.sh
      - name: Upload log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-log
          path: repro.log
